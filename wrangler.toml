name = "vollna-bot"
main = "src/index.ts"
compatibility_date = "2026-05-13"

# DEDUPE KV namespace.
# Create it with: npx wrangler kv namespace create DEDUPE
# Paste the returned id below in place of REPLACE_WITH_KV_NAMESPACE_ID.
[[kv_namespaces]]
binding = "DEDUPE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
